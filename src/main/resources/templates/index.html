<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kahve Köşesi - Dijital Menü</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .menu-card { border: none; border-radius: 15px; transition: transform 0.2s; }
        .menu-card:hover { transform: translateY(-5px); }
        .hero-section { background: linear-gradient(135deg, #6f4e37, #a67c52); color: white; padding: 60px 0; border-radius: 0 0 30px 30px; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">☕ Kahve Köşesi</a>
        <div class="ms-auto">
            <a href="/login" class="btn btn-sm btn-outline-light fw-bold px-3">🔑 Personel Girişi</a>
        </div>
    </div>
</nav>

<div class="hero-section text-center shadow-sm">
    <h1 class="display-4 fw-bold">☕ Kahve Köşesi'ne Hoş Geldiniz</h1>
    <p class="lead">Masadan Sipariş Dönemi! Ürününüzü Seçin, Anında Masanıza Gelsin.</p>
</div>

<div class="container my-5">
    <div class="row">
        <div class="col-md-8">
            <h3 class="mb-4 fw-bold text-dark">📋 Menümüz</h3>
            <div class="row g-3">
                <div class="col-md-6" th:each="item : ${menu}">
                    <div class="card menu-card shadow-sm h-100 p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span class="badge bg-secondary mb-2" th:text="${item.category}">Kategori</span>
                                <h5 class="fw-bold mb-1" th:text="${item.name}">Ürün Adı</h5>
                                <h6 class="text-primary fw-bold mb-0" th:text="${item.price} + ' TL'">0.00 TL</h6>
                            </div>
                            <span class="fs-1">✨</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 p-4 sticky-top" style="top: 20px; border-radius: 20px;">
                <h4 class="mb-4 fw-bold text-center text-success">📲 Masadan Sipariş Ver</h4>
                <form th:action="@{/customer/order}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Masa Numaranız:</label>
                        <select name="tableId" class="form-select form-select-lg" required>
                            <option value="">-- Kaç Numaralı Masadasınız? --</option>
                            <option th:each="table : ${tables}" th:value="${table.id}" th:text="'Masa ' + ${table.tableNumber}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">İstediğiniz Lezzet:</label>
                        <select name="menuItemId" class="form-select form-select-lg" required>
                            <option value="">-- Ne Alırsınız? --</option>
                            <option th:each="item : ${menu}" th:value="${item.id}" th:text="${item.name} + ' (' + ${item.price} + ' TL)'"></option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Kaç Adet?</label>
                        <input type="number" name="quantity" class="form-control form-control-lg" value="1" min="1" required>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 fw-bold py-3 shadow">Siparişi Tamamla 🎉</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
