<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kahve Köşesi - Personel Girişi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-box { max-width: 400px; border-radius: 20px; border: none; }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center style" style="height: 100vh;">

<div class="card login-box shadow p-4 w-100">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-dark">🔑 Personel Girişi</h2>
        <p class="text-muted small">Kahve Köşesi Yönetim Sistemi</p>
    </div>

    <div th:if="${error}" class="alert alert-danger text-center py-2 small" role="alert">
        ❌ Kullanıcı adı veya şifre hatalı !
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Kullanıcı Adı:</label>
            <input type="text" name="username" class="form-control" placeholder="Örn: garson" required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Şifre:</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold py-2 shadow-sm mb-2">Giriş Yap 🚀</button>
        <a href="/" class="btn btn-outline-secondary btn-sm w-100">⬅️ Menüye Geri Dön</a>
    </form>
</div>

</body>
</html>
