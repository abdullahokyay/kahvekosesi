<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kahve Köşesi - Garson Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table-box { border-radius: 15px; min-height: 120px; transition: all 0.2s; }
        .bg-empty { background-color: #e8f5e9; border: 2px solid #81c784; color: #2e7d32; }
        .bg-occupied { background-color: #ffebee; border: 2px solid #e57373; color: #c62828; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="fw-bold m-0">🤵 Garson Canlı Salon Takibi</h1>
        <a href="/dashboard" class="btn btn-outline-secondary fw-bold">Eski Panele Dön</a>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="table : ${tables}">
            <div class="card table-box shadow-sm p-3" th:classappend="${table.isOccupied} ? 'bg-occupied' : 'bg-empty'">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h4 class="fw-bold mb-1" th:text="'Masa ' + ${table.tableNumber}">Masa X</h4>
                        <span class="badge" th:classappend="${table.isOccupied} ? 'bg-danger' : 'bg-success'"
                              th:text="${table.isOccupied} ? 'Müşteri İçeride' : 'Boş'"></span>
                    </div>

                    <div th:if="${table.isOccupied}" class="text-end">
                        <small class="text-muted d-block">Masa Durumu</small>
                        <span class="fs-6 fw-bold text-danger">Hesap Bekliyor 🧾</span>
                    </div>
                </div>

                <div class="mt-4" th:if="${table.isOccupied}">
                    <form th:action="@{/waiter/tables/{id}/checkout(id=${table.id})}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm w-100 fw-bold shadow-sm">Hesabı Kes & Masayı Kapat 🧾</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
