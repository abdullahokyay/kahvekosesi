<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kahve Köşesi - Garson Paneli</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f7f1e8;
            color: #2b2118;
        }

        .top-bar {
            background: linear-gradient(135deg, #2b2118, #7b4f32);
            color: white;
            border-radius: 0 0 34px 34px;
        }

        .table-card {
            border: none;
            border-radius: 26px;
            overflow: hidden;
            transition: 0.25s;
            background: white;
        }

        .table-card:hover {
            transform: translateY(-5px);
        }

        .status-empty {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .status-occupied {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .status-badge {
            border-radius: 999px;
            padding: 7px 13px;
            font-weight: 700;
        }

        .total-box {
            background: #2b2118;
            color: white;
            border-radius: 18px;
        }

        .order-line {
            background: #f8f4ef;
            border-radius: 16px;
            border: 1px solid #eadfd3;
        }

        .empty-icon {
            font-size: 42px;
        }
    </style>
</head>

<body>

<div class="top-bar shadow-sm py-5 mb-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

            <div>
                <h1 class="fw-bold mb-2">🤵 Garson Paneli</h1>
                <p class="lead text-white-50 mb-0">
                    Salon durumunu, aktif siparişleri ve masa hesaplarını takip et.
                </p>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/}" class="btn btn-outline-light fw-bold px-4">
                    Ana Sayfa
                </a>

                <form th:action="@{/logout}" method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <button type="submit" class="btn btn-warning fw-bold px-4">
                        Çıkış Yap
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<div class="container pb-5">

    <div class="row g-4">

        <div class="col-lg-4 col-md-6" th:each="table : ${tables}">

            <div class="card table-card shadow-sm h-100">

                <div class="card-body p-4">

                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h3 class="fw-bold mb-1" th:text="'Masa ' + ${table.tableNumber}">
                                Masa X
                            </h3>

                            <span class="status-badge"
                                  th:classappend="${table.isOccupied} ? ' status-occupied' : ' status-empty'"
                                  th:text="${table.isOccupied} ? 'Dolu' : 'Boş'">
                            </span>
                        </div>

                        <div class="empty-icon" th:text="${table.isOccupied} ? '🧾' : '✅'">
                            ✅
                        </div>
                    </div>

                    <div th:if="${table.isOccupied}">

                        <div class="total-box p-3 mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold">Toplam Hesap</span>
                                <span class="fw-bold fs-4">
                                    <span th:text="${orderService.getTableTotal(table.id)}"></span> TL
                                </span>
                            </div>

                            <div class="small text-white-50 mt-1">
                                <span th:text="${orderService.getOrderCountForTable(table.id)}"></span>
                                aktif sipariş kalemi
                            </div>
                        </div>

                        <h6 class="fw-bold mb-2">Sipariş Detayı</h6>

                        <div class="order-line p-3 mb-2"
                             th:each="order : ${orderService.getOrdersByTable(table.id)}">

                            <div class="d-flex justify-content-between gap-2">
                                <div>
                                    <strong th:text="${order.menuItem.name}">
                                        Ürün
                                    </strong>

                                    <div class="text-muted small">
                                        <span th:text="${order.quantity}"></span>
                                        adet x
                                        <span th:text="${order.menuItem.price}"></span>
                                        TL
                                    </div>
                                </div>

                                <strong>
                                    <span th:text="${order.menuItem.price * order.quantity}"></span>
                                    TL
                                </strong>
                            </div>

                        </div>

                        <form th:action="@{/waiter/tables/{id}/checkout(id=${table.id})}"
                              method="post"
                              class="mt-3">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">

                            <button type="submit"
                                    class="btn btn-danger w-100 fw-bold py-2 shadow-sm">
                                Hesabı Kes & Masayı Kapat
                            </button>

                        </form>

                    </div>

                    <div th:unless="${table.isOccupied}" class="text-center py-4">
                        <div class="display-5 mb-2">☕</div>
                        <h5 class="fw-bold text-success">Masa boş</h5>
                        <p class="text-muted mb-0">
                            Bu masada aktif sipariş bulunmuyor.
                        </p>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
